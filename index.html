<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>krsh.ai | Private Root v1.6</title>
    <style>
        body { 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            padding: 15px; /* Tambahin padding biar nggak nempel pinggir */
            margin: 0; 
            height: 100vh; 
            box-sizing: border-box; /* Biar padding nggak ngerusak layout */
            overflow-x: hidden; /* Biar nggak ada scroll kanan-kiri */
        }
        #terminal { 
            width: 100%; 
            height: 100%; 
            overflow-y: auto; 
            font-size: 14px; /* Ukuran font disesuaikan buat layar HP */
            line-height: 1.4;
        }
        .line { 
            display: block; 
            margin-bottom: 5px; 
            white-space: pre-wrap; 
            word-wrap: break-word; /* Biar teks panjang otomatis turun ke bawah */
        }
        #input-area { display: flex; flex-wrap: wrap; align-items: center; }
        input { 
            background: transparent; 
            border: none; 
            color: #0f0; 
            font-family: inherit; 
            font-size: inherit; 
            outline: none; 
            flex-grow: 1; 
            min-width: 100px;
        }
        .hidden { display: none; }
        #caret { width: 8px; height: 15px; background: #0f0; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .err { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <span class="line">KRSH_AI PRIVATE KERNEL [Version 1.6.0_STABLE]</span>
        <span class="line">RESTRICTED ACCESS: ADMIN KANZA ONLY.</span>
        <span class="line">&nbsp;</span>
        <span class="line">Please authenticate to open secure tunnel:</span>
        <div id="input-area">
            <span style="margin-right: 10px;">kanza@krsh_ai:~#</span>
            <input type="password" id="authKey" autofocus onkeydown="check(event)">
            <span id="caret"></span>
        </div>
        <div id="logs"></div>
    </div>

    <script>
        /* Logic tetap sama seperti v1.6 kamu */
        const logs = document.getElementById('logs');
        const inputArea = document.getElementById('input-area');
        const authKey = document.getElementById('authKey');

        function check(e) { if (e.key === 'Enter') { validate(); } }

        async function validate() {
            const secret = "Kz!@#99_X-Rsh.Ai";
            const val = authKey.value;
            if (val === secret) {
                inputArea.classList.add('hidden');
                await print("> Synchronizing private keys...");
                await sleep(1000);
                await print("> [OK] Identity verified: Admin Kanza.");
                await sleep(600);
                await successSequence();
            } else {
                inputArea.classList.add('hidden');
                await print("> [ERROR] ACCESS DENIED.", "err");
                await sleep(2000);
                location.reload();
            }
        }

        async function print(text, className = "") {
            const l = document.createElement('span');
            l.className = 'line ' + className;
            l.textContent = text;
            logs.appendChild(l);
            logs.scrollTop = logs.scrollHeight;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function successSequence() {
            const msg = [
                "------------------------------------------",
                "SYSTEM ONLINE - WELCOME HOME, BOSS.",
                "------------------------------------------",
                "> Server Loc      : GitHub Pages (kanzzxdd)",
                "> Webpage Status  : [SECURE / ON-SAFE]",
                "> Bot AI Engine   : [ACTIVE / PROTECTED]",
                "> WhatsApp Channel: [STABLE / ENCRYPTED]",
                "> Encryption      : AES-256 Enabled",
                "------------------------------------------",
                "Ready for your commands...",
                "kanza@krsh_ai_private:~$ _"
            ];
            for (let t of msg) {
                const l = document.createElement('span');
                l.className = 'line';
                logs.appendChild(l);
                for (let c of t) {
                    l.textContent += c;
                    await sleep(25);
                }
                logs.scrollTop = logs.scrollHeight;
            }
        }
    </script>
</body>
</html>
