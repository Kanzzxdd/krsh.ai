<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>krsh.ai | Kernel</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; margin: 0; height: 100vh; overflow: hidden; }
        #terminal { width: 100%; height: 100%; overflow-y: auto; }
        .line { display: block; margin-bottom: 5px; white-space: pre-wrap; }
        #input-area { display: flex; align-items: center; }
        input { background: transparent; border: none; color: #0f0; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; }
        .hidden { display: none; }
        #caret { width: 8px; height: 15px; background: #0f0; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal">
        <span class="line">KRSH_AI KERNEL v2.6.0_STABLE (ENCRYPTED)</span>
        <span class="line">AUTHORIZED PERSONNEL ONLY.</span>
        <span class="line">&nbsp;</span>
        <span class="line">Enter Core Password:</span>
        <div id="input-area">
            <span style="margin-right: 10px;">root@krsh_ai:~#</span>
            <input type="password" id="authKey" autofocus onkeydown="check(event)">
            <span id="caret"></span>
        </div>
        <div id="logs"></div>
    </div>

    <script>
        /* Logika utama terminal Kanza */
        const logs = document.getElementById('logs');
        const inputArea = document.getElementById('input-area');
        const authKey = document.getElementById('authKey');

        function check(e) {
            if (e.key === 'Enter') {
                run();
            }
        }

        async function run() {
            const secret = "Kz!@#99_X-Rsh.Ai";
            if (authKey.value === secret) {
                inputArea.classList.add('hidden');
                await print("> Accessing core system...");
                await sleep(1000);
                await print("> [OK] Authentication successful.");
                await sleep(500);
                await startPrank();
            } else {
                alert("ACCESS DENIED");
                location.reload();
            }
        }

        async function print(text) {
            const l = document.createElement('span');
            l.className = 'line';
            l.textContent = text;
            logs.appendChild(l);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function startPrank() {
            const msg = [
                "------------------------------------------",
                "WELCOME, ADMIN KANZA",
                "------------------------------------------",
                "> Server Status : Online",
                "> AI Core       : Active",
                "> Logs          : Video Injected Successfully",
                "> Source        : Instagram Reels Decrypted",
                "------------------------------------------",
                "root@krsh_ai: Ready._"
            ];
            for (let t of msg) {
                const l = document.createElement('span');
                l.className = 'line';
                logs.appendChild(l);
                for (let c of t) {
                    l.textContent += c;
                    await sleep(30);
                }
            }
        }
    </script>
</body>
</html>
