<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>krsh.ai | Private Root</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; margin: 0; height: 100vh; overflow: hidden; }
        #terminal { width: 100%; height: 100%; overflow-y: auto; }
        .line { display: block; margin-bottom: 5px; white-space: pre-wrap; }
        #input-area { display: flex; align-items: center; }
        input { background: transparent; border: none; color: #0f0; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; }
        .hidden { display: none; }
        #caret { width: 8px; height: 15px; background: #0f0; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .err { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <span class="line">KRSH_AI PRIVATE KERNEL v2.6.0</span>
        <span class="line">RESTRICTED ACCESS: ADMIN KANZA ONLY.</span>
        <span class="line">&nbsp;</span>
        <span class="line">Please authenticate to open secure tunnel:</span>
        <div id="input-area">
            <span style="margin-right: 10px;">kanza@krsh_ai:~#</span>
            <input type="password" id="authKey" autofocus onkeydown="check(event)">
            <span id="caret"></span>
        </div>
        <div id="logs"></div>
    </div>

    <script>
        const logs = document.getElementById('logs');
        const inputArea = document.getElementById('input-area');
        const authKey = document.getElementById('authKey');

        function check(e) {
            if (e.key === 'Enter') {
                validate();
            }
        }

        async function validate() {
            const secret = "Kz!@#99_X-Rsh.Ai";
            const val = authKey.value;
            inputArea.classList.add('hidden');

            if (val === secret) {
                await print("> Synchronizing private keys...");
                await sleep(1000);
                await print("> [OK] Identity verified: Admin Kanza.");
                await sleep(600);
                await successSequence();
            } else {
                await print("> [ERROR] ACCESS DENIED: Signature Mismatch.");
                await sleep(800);
                await print("> [CRITICAL]: Intruder alert triggered.", "err");
                await print("> [SYSTEM]: Capturing network fingerprints...", "err");
                await sleep(1500);
                await print("> Connection terminated by server.", "err");
                await sleep(2000);
                location.reload();
            }
        }

        async function print(text, className = "") {
            const l = document.createElement('span');
            l.className = 'line ' + className;
            l.textContent = text;
            logs.appendChild(l);
            return new Promise(r => setTimeout(r, 50));
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function successSequence() {
            const msg = [
                "------------------------------------------",
                "SYSTEM ONLINE - WELCOME HOME, BOSS.",
                "------------------------------------------",
                "> Server Loc  : GitHub Pages (kanzzxdd)",
                "> Encryption  : AES-256 Enabled",
                "> AI Status   : Fully Operational",
                "------------------------------------------",
                "Ready for your commands...",
                "kanza@krsh_ai_private:~$ _"
            ];
            for (let t of msg) {
                const l = document.createElement('span');
                l.className = 'line';
                logs.appendChild(l);
                for (let c of t) {
                    l.textContent += c;
                    await sleep(25);
                }
            }
        }
    </script>
</body>
</html>
